apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "persona-drift.name" . }}-nginx
  labels:
    {{- include "persona-drift.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        location /ollama/ {
            proxy_pass         http://{{ include "persona-drift.name" . }}-ollama:11434/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_buffering    off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
