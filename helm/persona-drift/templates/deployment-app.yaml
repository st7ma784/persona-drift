apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "persona-drift.name" . }}-app
  labels:
    {{- include "persona-drift.labels" . | nindent 4 }}
    component: app
spec:
  replicas: {{ .Values.app.replicas }}
  selector:
    matchLabels:
      app: {{ include "persona-drift.name" . }}-app
  template:
    metadata:
      labels:
        app: {{ include "persona-drift.name" . }}-app
        {{- include "persona-drift.labels" . | nindent 8 }}
    spec:
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "persona-drift.name" . }}-nginx
      containers:
        - name: app
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
