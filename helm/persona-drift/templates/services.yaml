apiVersion: v1
kind: Service
metadata:
  name: {{ include "persona-drift.name" . }}-app
  labels:
    {{- include "persona-drift.labels" . | nindent 4 }}
    component: app
spec:
  selector:
    app: {{ include "persona-drift.name" . }}-app
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "persona-drift.name" . }}-ollama
  labels:
    {{- include "persona-drift.labels" . | nindent 4 }}
    component: ollama
spec:
  selector:
    app: {{ include "persona-drift.name" . }}-ollama
  ports:
    - port: 11434
      targetPort: 11434
  clusterIP: None   # headless — StatefulSet DNS resolution
