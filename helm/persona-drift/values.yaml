# Populated by ClusterOS's clusteros-helm-values ConfigMap via Fleet's
# helm.valuesFrom (see fleet.yaml). Defaults below are only used for manual
# `helm install` outside of Fleet/GitOps.
global:
  clusterDomain: ""        # e.g. "example.com" — filled in by clusteros-helm-values
  clusterMode: "nip"        # "domain" | "nip"
  ingressAnnotations: {}    # ssl-redirect etc., filled in by clusteros-helm-values

app:
  image:
    repository: ghcr.io/st7ma784/persona-drift
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  ingress:
    enabled: true
    className: nginx
    subdomain: personas        # host becomes "<subdomain>.<global.clusterDomain>"
    hostname: ""               # manual override/fallback when no cluster domain is configured
    tls: false
    # tlsSecret: persona-drift-tls

ollama:
  image:
    repository: ollama/ollama
    tag: "0.5.7"
    pullPolicy: IfNotPresent
  # Max seconds the init container will wait for `ollama pull` before failing
  # (fails fast with a clear error instead of hanging the GitOps rollout indefinitely)
  pullModelTimeoutSeconds: 600
  resources:
    requests:
      cpu: 500m
      memory: 4Gi
    limits:
      cpu: 4
      memory: 16Gi
  persistence:
    size: 50Gi
    storageClass: ""          # leave blank to use cluster default
  gpu:
    enabled: false
    # Set to true and configure tolerations/nodeSelector for GPU nodes:
    # nodeSelector:
    #   accelerator: nvidia-tesla-t4
    # tolerations:
    #   - key: nvidia.com/gpu
    #     operator: Exists
    #     effect: NoSchedule
  # Pull a default model on first startup via an init container
  defaultModel: "llama3.2:3b"
