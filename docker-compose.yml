services:

  ollama:
    image: ollama/ollama:latest
    container_name: persona-drift-ollama
    ports:
      - "11434:11434"           # exposed so you can also call it directly from host
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_ORIGINS=*        # allow browser CORS if calling directly
    restart: unless-stopped
    # Uncomment for GPU support (NVIDIA):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  app:
    build: .
    container_name: persona-drift-app
    ports:
      - "8080:80"
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
